name: Release Workflow

on:
  push:
    branches:
      - main-workable
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Build with SAM
        run: sam build --use-container

      - name: Zip the contents
        id: zip
        run: |
          commit_hash=$(git rev-parse --short HEAD)
          zip_name="apache-iceberg-monitoring-${commit_hash}.zip"
          cd .aws-sam/build/IcebergMetricsLambda
          zip -r "../../../${zip_name}" .
          echo "zip_name=${zip_name}" >> $GITHUB_OUTPUT

      - name: Generate changelog with commit links
        id: changelog
        run: |
          repo_url="https://github.com/${{ github.repository }}"
          git fetch --prune --unshallow
          previous_tag=$(git tag --sort=-creatordate | tail -n 1)
          if [ -z "$previous_tag" ]; then
            range=""
          else
            range="$previous_tag..HEAD"
          fi
          changelog=""
          while read -r hash message; do
            changelog="${changelog}* [${message}](${repo_url}/commit/${hash})"$'\n'
          done < <(git log $range --pretty=format:"%H %s")
          echo "changelog<<EOF" >> $GITHUB_ENV
          echo "$changelog" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: apache-iceberg-monitoring-${{ github.sha }}
          release_name: apache-iceberg-monitoring-${{ github.short_sha }}
          body: ${{ env.changelog }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ steps.zip.outputs.zip_name }}
          asset_name: ${{ steps.zip.outputs.zip_name }}
          asset_content_type: application/zip